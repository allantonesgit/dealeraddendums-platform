# Nginx config for apps.dealeraddendums.com
# Place at: /etc/nginx/sites-available/dealeraddendums
# Then: sudo ln -s /etc/nginx/sites-available/dealeraddendums /etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name apps.dealeraddendums.com;

    # Redirect HTTP to HTTPS (after cert is installed via certbot)
    # Uncomment after running: sudo certbot --nginx -d apps.dealeraddendums.com
    # return 301 https://$host$request_uri;

    # ── Homepage / Admin ──────────────────────────────────────────────────────
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ── State Rules App ───────────────────────────────────────────────────────
    location /staterules {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Support SSE (streaming responses)
        proxy_buffering off;
        proxy_read_timeout 120s;
    }

    # ── Add new apps below ────────────────────────────────────────────────────
    # location /myapp {
    #     proxy_pass http://localhost:3002;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_cache_bypass $http_upgrade;
    # }

    # ── Logs ──────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/dealeraddendums-access.log;
    error_log  /var/log/nginx/dealeraddendums-error.log;
}

